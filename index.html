<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KIRIKI</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --neon-green: #39ff14;
        }

        /* Quitamos las barras de desplazamiento y fijamos el tamaño */
        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        body { 
            background: linear-gradient(135deg, #050505 0%, #111 50%, #082408 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white; font-family: 'Arial Black', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; 
            perspective: 1200px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Título un poco más compacto para ganar espacio */
        h1 {
            font-size: clamp(40px, 8vh, 80px); 
            margin: 0 0 5px 0; 
            color: var(--gold);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.4), 4px 6px 0 #000;
            letter-spacing: 12px; z-index: 10;
        }

        .escena { 
            position: relative; transform: rotateX(20deg); 
            display: flex; justify-content: center; align-items: center;
            /* Escalamos la mesa según el alto de la pantalla */
            transform: rotateX(20deg) scale(0.9);
        }

        .bandeja-container { 
            position: relative; width: 500px; height: 500px; 
            background: #0a0a0a; border-radius: 50%; 
            box-shadow: 0 15px 0 #000, 0 30px 60px rgba(0,0,0,0.9);
            padding: 15px; box-sizing: border-box; 
        }

        .fieltro { 
            width: 100%; height: 100%; 
            background: radial-gradient(circle at 50% 40%, #2ecc71 0%, #219150 70%, #144418 100%); 
            border-radius: 50%; 
            box-shadow: inset 0 20px 50px rgba(0,0,0,0.8); 
            position: relative; display: flex; justify-content: center; align-items: center; 
        }

        .dados-area { display: flex; gap: 20px; position: absolute; z-index: 1; }
        .dado { 
            width: 85px; height: 85px; background: #fff; border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 2px 10px 20px rgba(0,0,0,0.6); 
        }

        .puntos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 10px; width: 100%; height: 100%; box-sizing: border-box; }
        .punto { width: 15px; height: 15px; border-radius: 50%; margin: auto; }
        .negro { background: #222; } .rojo-p { background: #d32f2f; } .inv { opacity: 0; }
        .poker-txt { font-size: 55px; font-weight: bold; font-family: 'Times New Roman', serif; line-height: 1; }
        .as-rojo { width: 45px; height: 45px; background: #d32f2f; border-radius: 50%; }

        .cubilete-wrap { 
            position: absolute; z-index: 100; cursor: pointer; 
            transform: translateY(-10px); 
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; flex-direction: column; align-items: center; 
        }
        
        .cubilete { 
            width: 170px; height: 230px; 
            background: linear-gradient(135deg, #0a0a0a 0%, #222 45%, #000 100%); 
            border-radius: 90px 90px 25px 25px / 35px 35px 15px 15px; 
            position: relative; border: 1px solid rgba(255,255,255,0.05);
        }

        .cubilete::after { 
            content: ""; position: absolute; bottom: 45px; left: 0; right: 0; 
            height: 2px; border-top: 2px dashed rgba(255,255,255,0.2); 
        }

        .sombra-cubilete { 
            width: 200px; height: 35px; background: rgba(0,0,0,0.7); 
            border-radius: 50%; margin-top: -15px; filter: blur(12px); z-index: -1; 
        }

        .texto-accion {
            color: var(--gold); font-size: 14px; letter-spacing: 3px;
            margin-bottom: 10px; opacity: 0; transition: 0.3s;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .cubilete-wrap.listo .texto-accion { opacity: 1; }
        .cubilete-wrap.levantado { transform: translate(160px, -170px) rotate(15deg); }
        .cubilete-wrap.levantado .texto-accion { opacity: 0; }
        .agitando { animation: shake 0.1s infinite; }

        @keyframes shake { 
            0% { transform: translate(2px, -10px); } 
            50% { transform: translate(-2px, -14px); } 
            100% { transform: translate(2px, -10px); } 
        }

        .ui { margin-top: 20px; z-index: 10; }
        button { 
            padding: 18px 60px; font-size: 22px; font-weight: bold; font-family: 'Arial Black', sans-serif;
            background: var(--gold); border: none; border-radius: 50px; color: #000; cursor: pointer; 
            box-shadow: 0 6px 0 #b8860b, 0 10px 20px rgba(0,0,0,0.4); transition: 0.1s;
        }
        button:hover { background: #fff; }
        button:active { transform: translateY(4px); box-shadow: 0 3px 0 #b8860b; }

        #anuncio { 
            font-size: clamp(30px, 6vh, 50px); 
            color: #fff; height: 60px; margin-bottom: 5px; 
            text-shadow: 0 0 20px var(--neon-green), 2px 2px 5px #000; 
        }
    </style>
</head>
<body>

    <h1>KIRIKI</h1>
    <div id="anuncio"></div>

    <div class="escena">
        <div class="bandeja-container">
            <div class="fieltro">
                <div class="dados-area">
                    <div id="dado1" class="dado"></div>
                    <div id="dado2" class="dado"></div>
                </div>
                <div id="cubilete-btn" class="cubilete-wrap" onclick="toggleMirar()">
                    <div class="texto-accion">LEVANTAR</div>
                    <div class="cubilete"></div>
                    <div class="sombra-cubilete"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="ui"><button onclick="tirar()">¡LANZAR!</button></div>

<script>
    const sonidoCubilete = new Audio('cubilete.ogg');

    const CARAS = [
        { nombre: "negros", pts: 1, html: '<div class="puntos-grid"><div class="punto negro"></div><div class="punto inv"></div><div class="punto negro"></div><div class="punto negro"></div><div class="punto negro"></div><div class="punto negro"></div><div class="punto negro"></div><div class="punto inv"></div><div class="punto negro"></div></div>' },
        { nombre: "rojos", pts: 2, html: '<div class="puntos-grid"><div class="punto rojo-p"></div><div class="punto inv"></div><div class="punto rojo-p"></div><div class="punto rojo-p"></div><div class="punto rojo-p"></div><div class="punto rojo-p"></div><div class="punto rojo-p"></div><div class="punto inv"></div><div class="punto rojo-p"></div></div>' },
        { nombre: "jotas", pts: 3, html: '<div class="poker-txt" style="color:#222">J</div>' },
        { nombre: "damas", pts: 4, html: '<div class="poker-txt" style="color:#222">Q</div>' },
        { nombre: "reyes", pts: 5, html: '<div class="poker-txt" style="color:#d32f2f">K</div>' },
        { nombre: "ases", pts: 6, html: '<div class="as-rojo"></div>' }
    ];

    let dadosActuales = [null, null];

    function tirar() {
        const wrap = document.getElementById('cubilete-btn');
        wrap.classList.remove('levantado', 'listo');
        document.getElementById('anuncio').innerText = "";
        
        sonidoCubilete.currentTime = 0;
        sonidoCubilete.play().catch(() => {});
        
        wrap.classList.add('agitando');

        setTimeout(() => {
            wrap.classList.remove('agitando');
            wrap.classList.add('listo');
            dadosActuales = [CARAS[Math.floor(Math.random()*6)], CARAS[Math.floor(Math.random()*6)]];
            document.getElementById('dado1').innerHTML = dadosActuales[0].html;
            document.getElementById('dado2').innerHTML = dadosActuales[1].html;
        }, 1100);
    }

    function toggleMirar() {
        if (!dadosActuales[0]) return;
        const wrap = document.getElementById('cubilete-btn');
        wrap.classList.toggle('levantado');
        if (wrap.classList.contains('levantado')) {
            const d1 = dadosActuales[0], d2 = dadosActuales[1];
            let res = "";
            if ((d1.pts === 1 && d2.pts === 2) || (d1.pts === 2 && d2.pts === 1)) res = "¡KIRIKI!";
            else if (d1.pts === d2.pts) res = "Pareja de " + d1.nombre;
            else res = (d1.pts + d2.pts);
            document.getElementById('anuncio').innerText = res;
        } else {
            document.getElementById('anuncio').innerText = "";
        }
    }
</script>
</body>
</html>
