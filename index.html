<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Línea vital para que el móvil entienda el tamaño real de la pantalla -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIRIKI</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --neon-green: #39ff14;
        }

        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            touch-action: manipulation; /* Mejora la respuesta táctil */
        }

        body { 
            background: linear-gradient(135deg, #050505 0%, #111 50%, #082408 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white; font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly; /* Distribuye el espacio mejor */
            perspective: 1200px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: clamp(40px, 10vh, 80px); 
            margin: 0; 
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4), 3px 4px 0 #000;
            letter-spacing: 8px;
            z-index: 10;
        }

        #anuncio { 
            font-size: clamp(24px, 5vh, 45px); 
            color: #fff; 
            height: 50px; 
            text-align: center;
            text-shadow: 0 0 15px var(--neon-green), 2px 2px 5px #000;
            margin: 5px 0;
        }

        /* --- ESCENA ADAPTABLE --- */
        .escena { 
            position: relative; 
            transform: rotateX(20deg); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            width: 100%;
        }

        .bandeja-container { 
            position: relative; 
            /* Tamaños adaptables */
            width: min(90vw, 500px); 
            height: min(90vw, 500px); 
            background: #0a0a0a; border-radius: 50%; 
            box-shadow: 0 15px 0 #000, 0 30px 60px rgba(0,0,0,0.9);
            padding: 12px; box-sizing: border-box; 
        }

        .fieltro { 
            width: 100%; height: 100%; 
            background: radial-gradient(circle at 50% 40%, #2ecc71 0%, #219150 70%, #144418 100%); 
            border-radius: 50%; 
            box-shadow: inset 0 15px 40px rgba(0,0,0,0.8); 
            position: relative; display: flex; justify-content: center; align-items: center; 
        }

        /* --- DADOS ADAPTABLES --- */
        .dados-area { display: flex; gap: 15px; position: absolute; z-index: 1; }
        .dado { 
            width: clamp(60px, 15vw, 85px); 
            height: clamp(60px, 15vw, 85px); 
            background: #fff; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 2px 8px 15px rgba(0,0,0,0.6); 
        }

        /* Ajuste de puntos para dados más pequeños */
        .puntos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 15%; width: 100%; height: 100%; box-sizing: border-box; }
        .punto { width: 80%; height: 80%; border-radius: 50%; margin: auto; }
        .negro { background: #222; } .rojo-p { background: #d32f2f; } .inv { opacity: 0; }
        .poker-txt { font-size: clamp(35px, 10vw, 55px); font-weight: bold; font-family: serif; }
        .as-rojo { width: 60%; height: 60%; background: #d32f2f; border-radius: 50%; }

        /* --- CUBILETE ADAPTABLE --- */
        .cubilete-wrap { 
            position: absolute; z-index: 100; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; 
        }
        
        .cubilete { 
            width: clamp(120px, 30vw, 170px); 
            height: clamp(160px, 40vw, 230px); 
            background: linear-gradient(135deg, #0a0a0a 0%, #222 45%, #000 100%); 
            border-radius: 80px 80px 20px 20px / 30px 30px 10px 10px; 
            position: relative; border: 1px solid rgba(255,255,255,0.05);
        }

        .sombra-cubilete { 
            width: 120%; height: 25px; background: rgba(0,0,0,0.7); 
            border-radius: 50%; margin-top: -10px; filter: blur(10px); z-index: -1; 
        }

        .texto-accion {
            color: var(--gold); font-size: 12px; letter-spacing: 2px;
            margin-bottom: 5px; opacity: 0; transition: 0.3s;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .cubilete-wrap.listo .texto-accion { opacity: 1; }
        .cubilete-wrap.levantado { transform: translate(25%, -30%) rotate(15deg); }
        .cubilete-wrap.levantado .texto-accion { opacity: 0; }
        .agitando { animation: shake 0.1s infinite; }

        @keyframes shake { 
            0% { transform: translate(2px, 0); } 
            50% { transform: translate(-2px, -4px); } 
            100% { transform: translate(2px, 0); } 
        }

        /* --- BOTÓN GRANDE PARA MÓVIL --- */
        .ui { margin-bottom: 20px; z-index: 10; width: 100%; display: flex; justify-content: center; }
        button { 
            width: min(80%, 300px);
            padding: 20px 0; font-size: 20px; font-weight: bold; 
            background: var(--gold); border: none; border-radius: 50px; color: #000; cursor: pointer; 
            box-shadow: 0 6px 0 #b8860b; transition: 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }

        /* AJUSTES ESPECÍFICOS PARA MÓVILES MUY PEQUEÑOS */
        @media (max-height: 600px) {
            h1 { font-size: 30px; }
            .bandeja-container { width: 70vh; height: 70vh; }
        }
    </style>
</head>
<body>

    <h1>KIRIKI</h1>
    <div id="anuncio"></div>

    <div class="escena">
        <div class="bandeja-container">
            <div class="fieltro">
                <div class="dados-area">
                    <div id="dado1" class="dado"></div>
                    <div id="dado2" class="dado"></div>
                </div>
                <div id="cubilete-btn" class="cubilete-wrap" onclick="toggleMirar()">
                    <div class="texto-accion">LEVANTAR</div>
                    <div class="cubilete"></div>
                    <div class="sombra-cubilete"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="ui"><button onclick="tirar()">¡LANZAR!</button></div>

<script>
    const sonidoCubilete = new Audio('cubilete.ogg');

    const CARAS = [
        { nombre: "negros", pts: 1, html: '<div class="puntos-grid"><div class="punto negro"></div><div class="punto inv"></div><div class="punto negro"></div><div class="punto negro"></div><div class="punto negro"></div><div class="punto negro"></div><div class="punto negro"></div><div class="punto inv"></div><div class="punto negro"></div></div>' },
        { nombre: "rojos", pts: 2, html: '<div class="puntos-grid"><div class="punto rojo-p"></div><div class="punto inv"></div><div class="punto rojo-p"></div><div class="punto rojo-p"></div><div class="punto rojo-p"></div><div class="punto rojo-p"></div><div class="punto rojo-p"></div><div class="punto inv"></div><div class="punto rojo-p"></div></div>' },
        { nombre: "jotas", pts: 3, html: '<div class="poker-txt" style="color:#222">J</div>' },
        { nombre: "damas", pts: 4, html: '<div class="poker-txt" style="color:#222">Q</div>' },
        { nombre: "reyes", pts: 5, html: '<div class="poker-txt" style="color:#d32f2f">K</div>' },
        { nombre: "ases", pts: 6, html: '<div class="as-rojo"></div>' }
    ];

    let dadosActuales = [null, null];

    function tirar() {
        const wrap = document.getElementById('cubilete-btn');
        wrap.classList.remove('levantado', 'listo');
        document.getElementById('anuncio').innerText = "";
        
        sonidoCubilete.currentTime = 0;
        sonidoCubilete.play().catch(() => {});
        
        wrap.classList.add('agitando');

        setTimeout(() => {
            wrap.classList.remove('agitando');
            wrap.classList.add('listo');
            dadosActuales = [CARAS[Math.floor(Math.random()*6)], CARAS[Math.floor(Math.random()*6)]];
            document.getElementById('dado1').innerHTML = dadosActuales[0].html;
            document.getElementById('dado2').innerHTML = dadosActuales[1].html;
        }, 1100);
    }

    function toggleMirar() {
        if (!dadosActuales[0]) return;
        const wrap = document.getElementById('cubilete-btn');
        wrap.classList.toggle('levantado');
        if (wrap.classList.contains('levantado')) {
            const d1 = dadosActuales[0], d2 = dadosActuales[1];
            let res = "";
            if ((d1.pts === 1 && d2.pts === 2) || (d1.pts === 2 && d2.pts === 1)) res = "¡KIRIKI!";
            else if (d1.pts === d2.pts) res = "Pareja de " + d1.nombre;
            else res = (d1.pts + d2.pts);
            document.getElementById('anuncio').innerText = res;
        } else {
            document.getElementById('anuncio').innerText = "";
        }
    }
</script>
</body>
</html>
